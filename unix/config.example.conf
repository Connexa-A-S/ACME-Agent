# CNXA ACME Unix agent configuration (KEY=VALUE, no shell).
# Copy to /etc/cnxa-acme/config.conf and chmod 600 (holds the service API key).

API_BASE_URL=https://acme.cnxa.cloud/api
SERVICE_API_KEY=cnxa_svc_REPLACE_ME

# pem (cert.crt/cert.key/issuer.crt) or pfx (certificate.pfx)
OUTPUT_FORMAT=pem
# Required only when OUTPUT_FORMAT=pfx
PFX_PASSWORD=

OUTPUT_PATH=/var/lib/cnxa-acme/certs
STATE_PATH=/var/lib/cnxa-acme/state
LOG_PATH=/var/log/cnxa-acme
HOOKS_PATH=/etc/cnxa-acme/hooks.d
RUN_HOOKS_ON_FIRST_DOWNLOAD=true
